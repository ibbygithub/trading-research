# BLS Consumer Price Index (CPI-U) release dates.
# Source: U.S. Bureau of Labor Statistics historical release schedule.
# Released at 8:30 AM ET, typically 2-3 weeks after the reference month ends.
# Falls on a Tuesday, Wednesday, or Thursday.
#
# Coverage: 2010-01-01 through 2025-12-31.
# NOTE: These dates are drawn from public BLS records. Verify against BLS
# actual release calendars before using in live-capital decisions.
# The October 2013 release was delayed to Oct 30 due to the government shutdown.
# Update this file annually when BLS publishes its next-year schedule.
#
# These dates are used to blackout strategy entries on release days.
# CPI releases are first-order drivers of ZN price action — the bond market
# reprices rate expectations immediately on release, making mean-reversion
# assumptions invalid for the remainder of the session.
