# Retention policy defaults for `trading-research clean` subcommands.
#
# A missing key uses the documented default from Chapter 56.5 §56.5.4.
# A missing file uses all documented defaults — `clean` does not require
# this YAML to exist.

runs:
  keep_last_per_strategy: 10
  archive_older_than: 90d
  archive_dir: outputs/archive/runs/

clean:
  keep_latest_per_tuple: true
  archive_dir: outputs/archive/clean/

features:
  keep_latest_per_tuple: true
  retire_tags: []                    # explicit list of tags to reap entirely

trials:
  keep_modes: [validation]              # never compacted or deleted at any age
  compact_after: 180d                   # exploration → compacted archive
  delete_after: 730d                    # exploration: archive → fully deleted
  archive_path: outputs/archive/trials/

logs:
  # JSONL log files live under logs/{YYYY-MM-DD}/{run_id}.jsonl
  # (see Chapter 52 §52.3). The date directory is the unit of retention.
  retention_days: 30                    # date directories older than this are reaped
  archive_dir: outputs/archive/logs/    # archived before delete (one tarball per day)
