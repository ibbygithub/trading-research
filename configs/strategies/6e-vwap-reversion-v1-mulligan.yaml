# 6E VWAP Mean Reversion v1 — Mulligan scale-in enabled
#
# Session 32: Mulligan re-entry layer added on top of base VWAP reversion.
# mulligan_n_atr=0.3 is intentionally loose at this baseline — session 33
# parameter sweep will explore {0.3, 0.5, 1.0, 1.5} to find the right gate.
# mulligan_target_atr=0.3 sets combined target at ATR×0.3 from avg entry;
# sweep should also include {0.1, 0.2, 0.3, 0.5}.

strategy_id: vwap-reversion-v1-6E-mulligan
template: vwap-reversion-v1
symbol: 6E
timeframe: 5m
feature_set: base-v1

knobs:
  entry_threshold_atr: 2.2
  exit_target_atr: 0.3
  stop_loss_atr: 2.5
  max_hold_bars: 60
  entry_window_start_utc: "12:00:00"
  entry_window_end_utc: "17:00:00"
  entry_blackout_minutes_after_session_open: 60
  flatten_offset_minutes_before_settlement: 0
  blackout_minutes_before_release: 30
  # Regime filter: required when mulligan_enabled=true so that Mulligan
  # does not fire in trending markets (data scientist recommendation, session 32).
  regime_filters:
    - volatility-regime
  vol_percentile_threshold: 75.0
  # Mulligan knobs
  mulligan_enabled: true
  mulligan_n_atr: 0.3
  mulligan_max_scale_ins: 1
  mulligan_target_atr: 0.3

backtest:
  fill_model: next_bar_open
  start_date: "2018-01-01"
  end_date: "2024-12-31"
