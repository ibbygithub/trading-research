# 6E VWAP Mean Reversion v2 — regime filter + Mulligan scale-in combined
#
# Session 33: gate evaluation run. This config combines:
#   1. VolatilityRegimeFilter (P75 ATR threshold, pre-committed sprint 31a)
#   2. Mulligan scale-in (second VWAP deviation trigger, sprint 32 infrastructure)
#
# exit_rules in VWAPReversionV1 emits scale_in when in a position and the
# vwap_spread_z crosses entry_threshold_atr again in the same direction.
# Engine validates freshness (M-1), directional gate (M-2), and combined
# risk (M-3) before accepting the scale-in.
#
# Evaluated under rolling-fit walk-forward (18m train / 6m test / 576-bar embargo).
# Two cost variants run in run_33a_v2_wf.py:
#   Realistic:   2.0-tick overlap slippage, $4.20/RT  (sprint 30 run #4 equiv.)
#   Pessimistic: 3.0-tick overlap slippage, $4.20/RT  (sprint 30 run #6 equiv.)

strategy_id: vwap-reversion-v1-6E-v2
template: vwap-reversion-v1
symbol: 6E
timeframe: 5m
feature_set: base-v1

knobs:
  entry_threshold_atr: 2.2
  exit_target_atr: 0.3
  stop_loss_atr: 2.5
  max_hold_bars: 60
  entry_window_start_utc: "12:00:00"
  entry_window_end_utc: "17:00:00"
  entry_blackout_minutes_after_session_open: 60
  flatten_offset_minutes_before_settlement: 0
  blackout_minutes_before_release: 30
  regime_filters:
    - volatility-regime
  vol_percentile_threshold: 75.0
  mulligan_enabled: true
  mulligan_n_atr: 0.3
  mulligan_max_scale_ins: 1
  mulligan_target_atr: 0.3

backtest:
  fill_model: next_bar_open
  start_date: "2018-01-01"
  end_date: "2024-12-31"
