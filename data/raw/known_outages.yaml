# Known data anomalies and market outages for raw @ZN continuous contract data.
# These entries document WHY certain quality report failures are expected/accepted
# for the @ZN (TradeStation continuous) dataset.
#
# The back-adjusted continuous series in data/clean/ supersedes @ZN for all
# backtesting purposes. These entries are reference documentation only.

outages:

  - symbol: ZN
    source: "@ZN (TradeStation continuous)"
    start_utc: "2023-09-08T00:00:00Z"
    end_utc:   "2023-09-21T23:59:59Z"
    type: roll_artifact
    severity: critical
    description: >
      TradeStation's @ZN continuous series held on TYU23 (September 2023
      expiry) well past the liquidity migration to TYZ23 (December 2023).
      TYU23 expired September 15 2023 (3rd Friday). The @ZN series shows
      30-1300 bars/day for Sept 11-20 while TYZ23 had 1275-1320 bars/day —
      confirming @ZN was reporting the illiquid front contract while the real
      market was in the December contract. RTH gaps in @ZN for this period
      are not real exchange outages; they reflect zero-activity in a near-
      expiry contract that TradeStation chose to track too long.
    resolution: >
      Use the back-adjusted continuous series in data/clean/ which rolls on a
      defined schedule (roll_days_before_expiry = 5 by default). The @ZN data
      for this period should not be used for backtesting.
    confirmed_by: >
      Direct comparison of TYZ23 vs @ZN bars for 2023-09-08 to 2023-09-22.
      TYZ23 bars saved to data/raw/TYZ23_1m_2023-09-08_2023-09-22.parquet.

  - symbol: ZN
    source: "@ZN (TradeStation continuous)"
    start_utc: "2024-07-18T05:01:00Z"
    end_utc:   "2024-07-19T05:00:00Z"
    type: exchange_outage
    severity: major
    description: >
      CME technology outage, July 18-19 2024. 960 missing bars starting
      2024-07-18 05:01 UTC (~16 hours of overnight data absent). Real
      market event; confirmed CME-side issue.
    resolution: Accepted known outage. No data available from any source.

  - symbol: ZN
    source: "@ZN (TradeStation continuous)"
    start_utc: "2012-10-29T00:00:00Z"
    end_utc:   "2012-10-30T23:59:59Z"
    type: exchange_closure
    severity: major
    description: >
      Hurricane Sandy. CME Globex suspended trading on October 29-30 2012.
      300-bar RTH gap on 2012-10-29 is the exchange closure, not missing data.
    resolution: Accepted known closure.

  - symbol: ZN
    source: "@ZN (TradeStation continuous)"
    dates: ["2011-12-26", "2012-01-02", "2012-12-25", "2013-01-01",
            "2013-12-25", "2014-01-01"]
    type: holiday_extended_closure
    severity: informational
    description: >
      Year-end extended closures (Christmas and New Year). CME extends the
      holiday halt window for these dates. 720-bar overnight gaps starting at
      23:01 UTC are the extended closure, not data errors. The CBOT_Bond
      calendar does not model the extended closure window for these dates.
    resolution: >
      Informational only. Overnight gaps outside RTH. No strategy should
      require data during these windows.
